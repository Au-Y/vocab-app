<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect x="128" y="96" width="256" height="340" rx="16" fill="white" opacity="0.95"/>
  <!-- 书页折痕 -->
  <line x1="256" y1="96" x2="256" y2="436" stroke="#667eea" stroke-width="2" opacity="0.3"/>
  <!-- 文字行 -->
  <rect x="160" y="140" width="72" height="12" rx="6" fill="#667eea" opacity="0.6"/>
  <rect x="160" y="170" width="88" height="12" rx="6" fill="#764ba2" opacity="0.4"/>
  <rect x="160" y="200" width="60" height="12" rx="6" fill="#667eea" opacity="0.3"/>
  <!-- 右边文字 -->
  <rect x="272" y="140" width="80" height="12" rx="6" fill="#667eea" opacity="0.5"/>
  <rect x="272" y="170" width="64" height="12" rx="6" fill="#764ba2" opacity="0.3"/>
  <!-- 字母 A -->
  <text x="256" y="320" text-anchor="middle" font-family="Georgia,serif" font-size="80" font-weight="bold" fill="#667eea" opacity="0.8">A</text>
  <!-- 放大镜 -->
  <circle cx="350" cy="260" r="28" fill="none" stroke="#764ba2" stroke-width="6" opacity="0.4"/>
  <line x1="370" y1="280" x2="390" y2="300" stroke="#764ba2" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
</svg>
